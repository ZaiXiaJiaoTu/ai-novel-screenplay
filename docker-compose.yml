services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ai_novel_screenplay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_novel_screenplay_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_novel_screenplay -d ai_novel_screenplay"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_NAME: ai-novel-screenplay
      APP_VERSION: 0.1.0
      ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: "false"
      DATABASE_URL: postgresql+psycopg://ai_novel_screenplay:${POSTGRES_PASSWORD:-ai_novel_screenplay_password}@postgres:5432/ai_novel_screenplay
      SECRET_KEY: ${SECRET_KEY:-change-me-before-production-ai-novel-screenplay}
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8080","http://127.0.0.1:8080"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
